<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator Tool</title>
<link rel="stylesheet" href="../style.css">
<style>
.container{
    background:white;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
    margin-top:40px;
}

input{
    width:80%;
    padding:10px;
    margin:10px 0;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#0077ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Password Generator</h1>
<p>Enter password length:</p>

<input type="number" id="length" placeholder="e.g. 12" min="4" max="50">
<br>
<button onclick="generatePassword()">Generate Password</button>

<div class="result" id="result"></div>
</div>

<script>
function generatePassword(){
    let length = document.getElementById("length").value || 12;
    let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
    let password = "";
    for(let i=0;i<length;i++){
        password += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    document.getElementById("result").innerText = password;
}
</script>

</body>
</html>
